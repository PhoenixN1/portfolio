            align-items: center;

        .about-content {

        .skill-progress {

        .skill-progress::after {
            content: '';

            position: relative;
            overflow: hidden;
            aspect-ratio: 16/10;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .project-card:hover .project-image img {
            transform: scale(1.1);
        }

        .project-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .project-card:hover .project-overlay {
            opacity: 1;
        }

        .project-links {
            display: flex;
            gap: 16px;
        }

        .project-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.1rem;
            text-decoration: none;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .project-card:hover .project-link {
            transform: translateY(0);
            opacity: 1;
        }

        .project-card:hover .project-link:nth-child(2) {
            transition-delay: 0.1s;
        }

        .project-card:hover .project-link:nth-child(3) {
            transition-delay: 0.2s;
        }

        .project-link:hover {
            transform: scale(1.15) !important;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.5);
        }

        .project-info {
            padding: 24px;
        }

        .project-info h3 {
            font-family: var(--font-secondary);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .project-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-tech span {
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--secondary);
        }

        .experience {
            padding: 100px 0;
            background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(30, 58, 95, 0.15) 50%, var(--bg-primary) 100%);
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 50px;
            width: 50%;
            padding: 0 40px;
        }

        .timeline-item:nth-child(odd) {
            margin-left: 0;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            margin-left: 50%;
            text-align: left;
        }

        .timeline-dot {
            position: absolute;
            top: 20px;
            width: 20px;
            height: 20px;
            background: var(--gradient-primary);
            border-radius: 50%;
            border: 4px solid var(--bg-primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }

        .timeline-item:nth-child(odd) .timeline-dot {
            right: -10px;
        }

        .timeline-item:nth-child(even) .timeline-dot {
            left: -10px;
        }

        .timeline-content {
            position: relative;
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            top: 24px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
        }

        .timeline-item:nth-child(odd) .timeline-content::before {
            right: -20px;
            border-left-color: var(--glass-border);
        }

        .timeline-item:nth-child(even) .timeline-content::before {
            left: -20px;
            border-right-color: var(--glass-border);
        }

        .timeline-date {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
        }



    <button class="back-to-top" id="back-to-top" aria-label="Retour en haut">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close">
                <i class="fas fa-times"></i>
            </button>
            <img src="" alt="Project" id="lightbox-img">
        </div>
    </div>

    <script>

    </script>
</body>

</html>
